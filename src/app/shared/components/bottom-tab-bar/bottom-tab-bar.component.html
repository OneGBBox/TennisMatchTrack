<nav class="tab-bar" role="tablist" aria-label="Main navigation">

  <a class="tab-item"
     routerLink="/matches"
     routerLinkActive="tab-item--active"
     role="tab"
     aria-label="Matches"
     [attr.aria-selected]="activeTab === 'matches'">
    <span class="tab-icon" aria-hidden="true">
      <!-- Racquet icon -->
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="8.5" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <line x1="4" y1="11" x2="18" y2="11" stroke="currentColor" stroke-width="1.5"/>
        <line x1="11" y1="4" x2="11" y2="18" stroke="currentColor" stroke-width="1.5"/>
        <line x1="6.5" y1="6.5" x2="15.5" y2="15.5" stroke="currentColor" stroke-width="1.2"/>
        <line x1="15.5" y1="6.5" x2="6.5" y2="15.5" stroke="currentColor" stroke-width="1.2"/>
        <line x1="17" y1="17" x2="23" y2="23" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </span>
    <span class="tab-label">Matches</span>
  </a>

  <a class="tab-item"
     routerLink="/players"
     routerLinkActive="tab-item--active"
     role="tab"
     aria-label="Players"
     [attr.aria-selected]="activeTab === 'players'">
    <span class="tab-icon" aria-hidden="true">
      <!-- Player icon -->
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="13" cy="8" r="4" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <path d="M5 22c0-4.418 3.582-8 8-8s8 3.582 8 8"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      </svg>
    </span>
    <span class="tab-label">Players</span>
  </a>

</nav>
